<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="soccer" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <!-- Balón de fútbol estilizado -->
      <g transform="translate(30, 30)">
        <circle cx="20" cy="20" r="18" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
        <path d="M20 2 L20 12 M20 28 L20 38 M2 20 L12 20 M28 20 L38 20" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
        <path d="M8 8 L15 15 M32 8 L25 15 M8 32 L15 25 M32 32 L25 25" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
      </g>
      
      <!-- Balón pequeño desplazado -->
      <g transform="translate(120, 80)">
        <circle cx="15" cy="15" r="12" fill="none" stroke="currentColor" stroke-width="1" opacity="0.2"/>
        <path d="M15 5 L15 25 M5 15 L25 15" stroke="currentColor" stroke-width="1" opacity="0.2"/>
      </g>
      
      <!-- Balón pequeño arriba derecha -->
      <g transform="translate(140, 20)">
        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1" opacity="0.25"/>
        <path d="M12 3 L12 21 M3 12 L21 12" stroke="currentColor" stroke-width="1" opacity="0.25"/>
      </g>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#soccer)"/>
</svg>
